<div class="w-auto bg-white border-1 border-gray-400 rounded-md p-2 flex flex-col gap-3">
  <img [src]="urlImage()" class="img-fixed hover:cursor-pointer" (click)="openDetail.emit()">
  <div class="w-full flex gap-2 justify-between items-center">
    <h1>{{nameCharacter()}}</h1>
    <app-button [isActive]="isFavorite()" (clickedButton)="addFavorite.emit(idCharacter())"></app-button>
  </div>
</div >
