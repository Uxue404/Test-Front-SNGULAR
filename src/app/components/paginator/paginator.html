<div class="flex items-center justify-center gap-2">

  <button (click)="previousPage.emit()" class="px-3 py-1 rounded-md border border-gray-300 text-gray-600 hover:bg-gray-100 flex items-center justify-center">
    <span class="material-symbols-outlined text-lg">
      chevron_left
    </span>
  </button>

  <div class="px-3 py-1 rounded-md border border-gray-300">
    {{currentPage()}} / {{totalPages()}}
  </div>
  <button (click)="nextPage.emit()" class="px-3 py-1 rounded-md border border-gray-300 text-gray-600 hover:bg-gray-100 flex items-center justify-center">
    <span class="material-symbols-outlined text-lg">
      chevron_right
    </span>
  </button>

</div>
